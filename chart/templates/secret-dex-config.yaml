{{- /*
  Custom Dex config Secret. Renders dex.config plus a storage block that points
  at the same external Postgres instance the gateway uses. Only emitted when
  Dex AND externalDatabase are enabled. Operators must wire the subchart to
  this Secret via:
    dex:
      configSecret:
        create: false
        name: <release>-artifact-gateway-dex-config
*/}}
{{- if and .Values.dex.enabled .Values.externalDatabase.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "artifact-gateway.dexConfigSecretName" . }}
  labels:
    {{- include "artifact-gateway.labels" . | nindent 4 }}
type: Opaque
stringData:
  config.yaml: |
    {{- $config := deepCopy .Values.dex.config }}
    {{- $pgConfig := dict
        "host" .Values.externalDatabase.host
        "port" (.Values.externalDatabase.port | int)
        "database" .Values.externalDatabase.databases.dex
        "user" .Values.externalDatabase.user
        "password" .Values.externalDatabase.password
        "ssl" (dict "mode" .Values.externalDatabase.sslMode)
    }}
    {{- $_ := set $config "storage" (dict "type" "postgres" "config" $pgConfig) }}
    {{- toYaml $config | nindent 4 }}
{{- end }}
