{{- if .Values.ingress.enabled -}}
# ⚠️ CRITICAL: every host in `tls.hosts[*]` below MUST exactly match
# `.Values.config.externalHostname` (and the cert SAN must include it).
# OCI clients (docker, helm, oras) abort with opaque `x509:` errors if the
# hostname they connect to is not in the cert SAN list. There is no graceful
# failure mode — pulls just stop working. See chart/README.md and
# /DEPLOYMENT.md "Cert / hostname constraint".
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "artifact-gateway.fullname" . }}
  labels:
    {{- include "artifact-gateway.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      {{- if .secretName }}
      secretName: {{ .secretName }}
      {{- end }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "artifact-gateway.fullname" $ }}
                port:
                  number: {{ $.Values.service.port }}
          {{- end }}
    {{- end }}
{{- end }}
