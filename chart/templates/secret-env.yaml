{{- if .Values.secrets.create }}
{{- /*
  Chart-managed env Secret. Cryptographic material (KEK / signing keys /
  service token) is auto-generated when not provided in values; `lookup`
  against the existing Secret preserves values across upgrades so generated
  material is stable. Annotated `helm.sh/resource-policy: keep` so `helm
  uninstall` does NOT remove the Secret — losing KEK_BASE64 would orphan
  every encrypted ghcr PAT at rest.
*/}}
{{- $secretName := include "artifact-gateway.envSecretName" . -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $existingData := dict -}}
{{- if and $existing $existing.data -}}{{- $existingData = $existing.data -}}{{- end -}}

{{- /* Resolve each secret value: explicit values.yaml > existing in cluster > newly generated. */ -}}
{{- $kekFromExisting := "" -}}
{{- if hasKey $existingData "KEK_BASE64" -}}{{- $kekFromExisting = index $existingData "KEK_BASE64" | b64dec -}}{{- end -}}
{{- $kek := .Values.secrets.kekBase64 | default $kekFromExisting | default (randBytes 32) -}}

{{- $sessionFromExisting := "" -}}
{{- if hasKey $existingData "SESSION_SIGNING_KEY" -}}{{- $sessionFromExisting = index $existingData "SESSION_SIGNING_KEY" | b64dec -}}{{- end -}}
{{- $session := .Values.secrets.sessionSigningKey | default $sessionFromExisting | default (randAlphaNum 64 | sha256sum) -}}

{{- $jwtFromExisting := "" -}}
{{- if hasKey $existingData "JWT_SIGNING_KEY" -}}{{- $jwtFromExisting = index $existingData "JWT_SIGNING_KEY" | b64dec -}}{{- end -}}
{{- $jwt := .Values.secrets.jwtSigningKey | default $jwtFromExisting | default (randAlphaNum 64 | sha256sum) -}}

{{- $svcFromExisting := "" -}}
{{- if hasKey $existingData "SERVICE_TOKEN" -}}{{- $svcFromExisting = index $existingData "SERVICE_TOKEN" | b64dec -}}{{- end -}}
{{- $svcToken := .Values.secrets.serviceToken | default $svcFromExisting | default (randAlphaNum 64 | sha256sum) -}}

apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "artifact-gateway.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  KEK_BASE64: {{ $kek | quote }}
  SESSION_SIGNING_KEY: {{ $session | quote }}
  JWT_SIGNING_KEY: {{ $jwt | quote }}
  SERVICE_TOKEN: {{ $svcToken | quote }}
  {{- /*
    DEX_CLIENT_SECRET mirrors dex.config.staticClients[<id>].secret so the
    gateway authenticates against Dex with the same shared secret Dex itself
    accepts. Pulled from the same values block to keep one source of truth.
  */}}
  {{- if .Values.dex.enabled }}
  {{- $dexClient := include "artifact-gateway.dexGatewayClient" . | fromYaml }}
  DEX_CLIENT_SECRET: {{ $dexClient.secret | quote }}
  {{- end }}
  {{- if .Values.secrets.natsAuthToken }}
  NATS_AUTH_TOKEN: {{ .Values.secrets.natsAuthToken | quote }}
  {{- end }}
  {{- if .Values.bootstrapAdmin.email }}
  ADMIN_BOOTSTRAP_EMAIL: {{ .Values.bootstrapAdmin.email | quote }}
  {{- end }}
  {{- if .Values.bootstrapAdmin.password }}
  ADMIN_BOOTSTRAP_PASSWORD: {{ .Values.bootstrapAdmin.password | quote }}
  {{- end }}
  {{- /*
    STATIC_ADMINS: comma-separated email:password pairs. An email present here
    is granted admin on OIDC login regardless of the users-table row (so an
    auto-provisioned viewer row doesn't downgrade the operator). The password
    is only used for direct /admin/login break-glass — OIDC ignores it but
    the colon-separator format requires it.
  */}}
  {{- if .Values.secrets.staticAdmins }}
  {{- $pairs := list -}}
  {{- range .Values.secrets.staticAdmins -}}
  {{- if and .email .password -}}
  {{- $pairs = append $pairs (printf "%s:%s" .email .password) -}}
  {{- end -}}
  {{- end }}
  STATIC_ADMINS: {{ join "," $pairs | quote }}
  {{- end }}
  {{- if .Values.database.url }}
  DATABASE_URL: {{ .Values.database.url | quote }}
  {{- else if .Values.externalDatabase.enabled }}
  DATABASE_URL: {{ include "artifact-gateway.externalDatabaseURL" . | quote }}
  {{- end }}
{{- end }}
