apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "artifact-gateway.configMapName" . }}
  labels:
    {{- include "artifact-gateway.labels" . | nindent 4 }}
data:
  PUBLIC_PORT: {{ .Values.service.port | quote }}
  MANAGEMENT_PORT: {{ .Values.service.managementPort | quote }}
  EXTERNAL_HOSTNAME: {{ .Values.config.externalHostname | quote }}
  UPSTREAM_GITHUB_API: {{ .Values.config.upstreamGitHubAPI | quote }}
  TOKEN_TTL_SECONDS: {{ .Values.config.tokenTTLSeconds | quote }}
  OIDC_AUTOPROVISION: {{ .Values.config.oidcAutoprovision | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  LOG_FORMAT: {{ .Values.config.logFormat | quote }}
  {{- if .Values.nats.url }}
  NATS_URL: {{ .Values.nats.url | quote }}
  {{- end }}
  {{- if .Values.nats.credentialsSecret }}
  NATS_CREDENTIALS_FILE: "/etc/nats-creds/user.creds"
  {{- end }}
  {{- /*
    When bundled Dex is enabled, surface the issuer + client-id to the gateway
    so bootstrapDexProvider (main.go) inserts the OIDC provider row on startup.
    Without these the registry has no "dex" entry and /api/v1/auth/oidc/dex/start
    returns 404 — i.e. dl.cnak.us never redirects to dex.cnak.us.
    DEX_CLIENT_SECRET lives in the env Secret alongside other crypto material.
  */}}
  {{- if .Values.dex.enabled }}
  {{- $dexClient := include "artifact-gateway.dexGatewayClient" . | fromYaml }}
  DEX_ISSUER_URL: {{ .Values.dex.config.issuer | quote }}
  DEX_CLIENT_ID: {{ $dexClient.id | quote }}
  {{- end }}
