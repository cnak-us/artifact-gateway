# artifact-gateway Helm chart — default values.
# Single-source-of-truth for chart configuration. Override per environment
# with values-dev.yaml / values-prod.yaml / etc.

image:
  repository: ghcr.io/cnak-us/artifact-gateway
  # Empty tag falls back to Chart.AppVersion.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
# - name: ghcr-secret

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

replicaCount: 1

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

# Binary serves embedded UI from memory and writes nothing to disk —
# readOnlyRootFilesystem is safe and enforced.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

nodeSelector: {}
tolerations: []
affinity: {}

service:
  type: ClusterIP
  port: 8080
  managementPort: 8090

# Ingress carries the OCI traffic. The TLS hosts list MUST match
# config.externalHostname exactly — see templates/ingress.yaml.
ingress:
  enabled: false
  className: ""
  annotations: {}
  # Example for nginx + cert-manager:
  #   nginx.ingress.kubernetes.io/proxy-body-size: "0"        # OCI blobs can be large
  #   nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
  #   cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: artifacts.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  # - secretName: artifact-gateway-tls
  #   hosts:
  #     - artifacts.example.com

# Non-secret runtime config (rendered into a ConfigMap and consumed via envFrom).
config:
  # The hostname customers type into `docker login`. MUST equal the
  # ingress TLS SAN or OCI clients fail with x509: errors.
  externalHostname: ""
  # GitHub REST API endpoint for non-OCI download sources (releases, assets).
  # Override for GitHub Enterprise Server (e.g. https://ghes.example.com/api/v3).
  upstreamGitHubAPI: "https://api.github.com"
  tokenTTLSeconds: 300
  oidcAutoprovision: false
  logLevel: "info"
  logFormat: "json"

# Postgres. Provide EXACTLY ONE of:
#   - .Values.database.url               inline DSN (rendered into the env Secret)
#   - .Values.database.existingSecret    BYO Secret + key holding the DSN
#   - .Values.externalDatabase.enabled   structured config shared with Dex
# When externalDatabase is enabled the chart also renders a Dex config Secret
# that points Dex's storage at the same instance — see externalDatabase below.
database:
  url: ""
  existingSecret: ""
  existingSecretKey: "url"

# Shared external Postgres (e.g. DO Managed DB, RDS, Cloud SQL). When enabled,
# the chart builds DATABASE_URL for the gateway AND renders a custom Dex config
# Secret pointing Dex's storage at the same host. Each service gets its own
# database name under `databases:` — pre-create them in the cluster.
#
#   psql -h <host> -p <port> -U <user> -d defaultdb \
#     -c 'CREATE DATABASE artifact_gateway;' \
#     -c 'CREATE DATABASE dex;'
#
# Mutually exclusive with .Values.database.url / .Values.database.existingSecret.
externalDatabase:
  enabled: false
  host: ""
  port: 5432
  user: ""
  password: ""
  sslMode: "require"
  databases:
    app: "artifact_gateway"
    dex: "dex"

# NATS is optional. Empty url disables audit publish + license cache invalidation.
nats:
  url: ""
  # K8s Secret with a `user.creds` key, mounted at /etc/nats-creds.
  credentialsSecret: ""

# Secret material.
#   secrets.create=true        → chart renders a Secret. Empty fields below are
#                                AUTO-GENERATED on first install and preserved
#                                across upgrades via `lookup` of the existing
#                                Secret. Provide explicit values only if you
#                                already have material to import.
#   secrets.existingSecret set → chart mounts that secret instead, fields ignored.
secrets:
  create: true
  existingSecret: ""
  # 32 bytes, base64. AES-GCM KEK for stored ghcr PATs. Losing this bricks
  # every encrypted column at rest. Auto-generated when empty (equivalent to
  # `openssl rand -base64 32`).
  kekBase64: ""
  # Hex, 32 bytes (64 chars). HMAC-SHA256 for admin/catalog session cookies.
  # Auto-generated when empty (equivalent to `openssl rand -hex 32`).
  sessionSigningKey: ""
  # Hex, 32 bytes (64 chars). HMAC-SHA256 for OCI bearer JWTs.
  # Auto-generated when empty.
  jwtSigningKey: ""
  # Shared secret for internal service callers. Auto-generated when empty.
  serviceToken: ""
  # NATS password-auth token (used only when nats.url is set without creds).
  natsAuthToken: ""

# One-time bootstrap admin, rendered into the env Secret. Rotate after first login.
# Leave both empty in environments where you'll create the first user via OIDC.
bootstrapAdmin:
  email: ""
  password: ""

metrics:
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}

networkPolicy:
  enabled: false
  # Additional CIDRs allowed for egress beyond default (DNS, ghcr, Postgres, NATS).
  additionalEgress: []
  # - cidr: 10.0.0.0/8
  #   ports:
  #     - port: 443
  #       protocol: TCP

# -----------------------------------------------------------------------------
# Optional bundled Dex IdP (chart dependency: https://github.com/dexidp/helm-charts).
# Off by default — most operators already run an OIDC provider. Flip
# `dex.enabled=true` to deploy Dex alongside the gateway; values under `dex:`
# are passed straight through to the upstream Dex subchart, so anything the
# upstream chart accepts (image, ingress, resources, …) works here.
#
# After install you still need to register Dex as an OIDC provider in the
# gateway admin UI (Name=dex, Issuer=<dex.config.issuer>, ClientID/Secret
# from `dex.config.staticClients`). See DEX.md.
#
# Production checklist (see DEX.md §6):
#   * Set `dex.config.storage.type: postgres` (or kubernetes) — the default
#     `memory` storage loses signing keys on every pod restart.
#   * Pin `dex.config.issuer` to a real, browser-reachable HTTPS URL and add
#     `dex.ingress`.
#   * Rotate the static client secret below.
#   * Add real connectors under `dex.config.connectors` (GitHub/Google/OIDC/…)
#     with credentials sourced from a Secret, not inline.
# -----------------------------------------------------------------------------
dex:
  enabled: false
  replicaCount: 1
  image:
    repository: dexidp/dex
    # Keep in lock-step with docker-compose.yml so dev (compose) and
    # production (helm) share the same Dex behavior. Bump both together.
    tag: v2.45.1
  service:
    ports:
      http:
        port: 5556
      grpc:
        port: 5557
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts: []
    # - host: dex.example.com
    #   paths:
    #     - path: /
    #       pathType: Prefix
    tls: []
  # Inline Dex config rendered into a Secret by the upstream subchart.
  # MUST be customized per environment — see commentary above.
  config:
    # Browser-reachable issuer URL. Override for production
    # (e.g. https://dex.example.com). Must match what users see in the gateway
    # admin UI's "Issuer URL" field.
    issuer: "http://localhost:5556"
    storage:
      # Dev default: in-memory, loses signing keys on restart. Swap for
      # `kubernetes` (CRDs) or `postgres` (config block required) in prod.
      type: memory
    web:
      http: 0.0.0.0:5556
    grpc:
      addr: 0.0.0.0:5557
    oauth2:
      # Skip the upstream "Grant access?" screen between Dex and the gateway.
      # Fine inside the trust boundary; revisit if Dex is multi-tenant.
      skipApprovalScreen: true
    # The single static client used by the gateway admin and catalog flows.
    # Each redirect URI must match what the gateway sends — mirror
    # config/dex.dev.yaml's URI list and adjust the host to your ingress.
    staticClients:
      - id: artifact-gateway
        name: artifact-gateway
        secret: dev-dex-client-secret
        redirectURIs:
          - http://localhost:8080/api/v1/auth/oidc/dex/callback
          - http://localhost:8080/catalog/oidc/dex/callback
    # Connectors are added per IdP (github/google/gitlab/oidc/saml/ldap).
    # Source secrets from envFrom + a Kubernetes Secret rather than inlining.
    connectors: []
    # - type: github
    #   id: github
    #   name: GitHub
    #   config:
    #     clientID: $GITHUB_CLIENT_ID
    #     clientSecret: $GITHUB_CLIENT_SECRET
    #     redirectURI: http://localhost:5556/callback
