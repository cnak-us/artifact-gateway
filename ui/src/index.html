<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#111217" />
    <meta name="description" content="CNAK Artifact Gateway — licensed OCI distribution" />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <title>Artifact Gateway · CNAK</title>

    <!-- Pre-paint theme bootstrap: apply the right class to <html> before any
         render so there's no light/dark flash. Mirrors cnak/frontend behavior.
         Same logic also runs in main.jsx — duplicated here only so it executes
         synchronously before stylesheets evaluate. -->
    <!-- NOTE: storage key here MUST match brand.themeStorageKey in src/brand/. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('cnak.theme');
          var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var mode = stored || (prefersDark ? 'dark' : 'light');
          if (mode === 'low-light') mode = 'dark';
          var root = document.documentElement;
          root.classList.remove('dark');
          if (mode === 'dark') root.classList.add(mode);
        } catch (e) { /* default to light */ }
      })();
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
