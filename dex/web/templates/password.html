{{ template "header.html" . }}

<div class="theme-panel">
  <div class="theme-panel__icon">
    <!-- MdLock -->
    <svg aria-hidden="true" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
      <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1s3.1 1.39 3.1 3.1v2z"/>
    </svg>
  </div>
  <h2 class="theme-heading">Sign In</h2>
  <p class="theme-subheading">Enter your credentials to continue</p>

  {{ if .Invalid }}
    <div id="login-error" class="theme-alert theme-alert--error" role="alert">
      Invalid credentials. Please try again.
    </div>
  {{ end }}

  <form method="post" action="{{ .PostURL }}" novalidate id="login-form">
    <div class="theme-form-row" id="row-login">
      <div class="theme-form-label">
        <label for="login">{{ .UsernamePrompt }}</label>
      </div>
      <input required id="login" name="login" type="text" class="theme-form-input" autocomplete="username" placeholder="user@example.com" {{ if .Username }} value="{{ .Username }}" {{ else }} autofocus {{ end }}/>
      <div class="theme-validation-msg">Please enter your username</div>
    </div>
    <div class="theme-form-row" id="row-password">
      <div class="theme-form-label">
        <label for="password">Password</label>
      </div>
      <input required id="password" name="password" type="password" class="theme-form-input" autocomplete="current-password" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;" {{ if .Invalid }} autofocus {{ end }}/>
      <div class="theme-validation-msg">Please enter your password</div>
    </div>

    <button id="submit-login" type="submit" class="dex-btn theme-btn--primary">Sign In</button>
  </form>

  {{ if .BackLink }}
  <div class="theme-link-back">
    <a href="{{ .BackLink }}">Select another sign-in method</a>
  </div>
  {{ end }}
</div>

<!-- Inline form validation — replaces browser tooltips with styled messages -->
<script>
  (function() {
    var form = document.getElementById('login-form');
    if (!form) return;

    form.addEventListener('submit', function(e) {
      var rows = form.querySelectorAll('.theme-form-row');
      rows.forEach(function(r) { r.classList.remove('is-invalid'); });

      var valid = true;
      var inputs = form.querySelectorAll('.theme-form-input[required]');
      inputs.forEach(function(input) {
        if (!input.value.trim()) {
          input.closest('.theme-form-row').classList.add('is-invalid');
          valid = false;
        }
      });

      if (!valid) {
        e.preventDefault();
        var first = form.querySelector('.is-invalid .theme-form-input');
        if (first) first.focus();
      }
    });

    form.addEventListener('input', function(e) {
      var row = e.target.closest('.theme-form-row');
      if (row && e.target.value.trim()) {
        row.classList.remove('is-invalid');
      }
    });
  })();
</script>

{{ template "footer.html" . }}
