{{ template "header.html" . }}

<div class="theme-panel">
  <div class="theme-panel__icon">
    <!-- MdDevices -->
    <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
      <path d="M4 6h18V4H2v13H0v3h14v-3H4V6zm20 2h-8c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h8c.55 0 1-.45 1-1V9c0-.55-.45-1-1-1zm-1 9h-6v-7h6v7z"/>
    </svg>
  </div>
  <h2 class="theme-heading">Device Authorization</h2>
  <p class="theme-subheading">Enter the code displayed on your device</p>

  <form method="post" action="{{ .PostURL }}">
    <div class="theme-form-row">
      <div class="theme-form-label">
        <label for="user_code">Device Code</label>
      </div>
      {{ if .UserCode }}
      <input tabindex="2" required id="user_code" name="user_code" type="text" class="theme-form-input" autocomplete="off" value="{{ .UserCode }}" {{ if .Invalid }} autofocus {{ end }}/>
      {{ else }}
      <input tabindex="2" required id="user_code" name="user_code" type="text" class="theme-form-input" placeholder="XXXX-XXXX" autocomplete="off" {{ if .Invalid }} autofocus {{ end }}/>
      {{ end }}
    </div>

    {{ if .Invalid }}
    <div id="login-error" class="theme-alert theme-alert--error">
      Invalid or expired device code.
    </div>
    {{ end }}

    <button tabindex="3" id="submit-login" type="submit" class="dex-btn theme-btn--primary">
      <span class="dex-btn-text">Submit</span>
    </button>
  </form>
</div>

{{ template "footer.html" . }}
