name: Deploy Test (kind)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (default: latest main-<sha>)'
        required: false
        type: string
        default: ''

permissions:
  contents: read
  packages: read

concurrency:
  group: deploy-test-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: cnak-us/artifact-gateway

jobs:
  smoke:
    name: Smoke Test on kind
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Resolve image tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            TAG="${{ github.event.inputs.image_tag }}"
          else
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            TAG="main-${SHORT_SHA}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Deploying image tag: $TAG"

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          version: v0.24.0
          cluster_name: artifact-gateway-smoke
          wait: 120s

      - name: Set up Helm
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4
        with:
          version: v3.16.2

      - name: Install Postgres (bitnami)
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update
          helm install pg bitnami/postgresql \
            --set auth.postgresPassword=postgres \
            --set auth.database=artifact_gateway \
            --wait --timeout 5m

      - name: Log in to GHCR (for image pull secret)
        run: |
          kubectl create secret docker-registry ghcr-pull \
            --docker-server=${{ env.REGISTRY }} \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }}

      - name: Install artifact-gateway
        run: |
          helm install artifact-gateway ./chart \
            -f chart/values-dev.yaml \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
            --set image.tag=${{ steps.tag.outputs.tag }} \
            --set imagePullSecrets[0].name=ghcr-pull \
            --wait --timeout 5m

      - name: Wait for deployment
        run: |
          kubectl rollout status deploy/artifact-gateway --timeout=300s
          kubectl get pods

      - name: Smoke test /v2/
        run: |
          # Expect 401 with WWW-Authenticate: Bearer challenge per OCI distribution spec.
          OUT=$(kubectl run smoke --rm -i --restart=Never --image=curlimages/curl:8.10.1 -- \
            -sSi http://artifact-gateway.default.svc.cluster.local/v2/ || true)
          echo "$OUT"
          echo "$OUT" | grep -q "HTTP/1.1 401" || { echo "::error::expected HTTP 401"; exit 1; }
          echo "$OUT" | grep -qi "WWW-Authenticate: Bearer" || { echo "::error::expected Bearer challenge"; exit 1; }
          echo "Smoke test passed: /v2/ returned 401 with Bearer challenge"

      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl get pods -A
          kubectl describe deploy/artifact-gateway || true
          kubectl logs deploy/artifact-gateway --tail=200 || true

      - name: Tear down
        if: always()
        run: |
          helm uninstall artifact-gateway || true
          helm uninstall pg || true
