name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.0 or 0.1.0)'
        required: true
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: cnak-us/artifact-gateway
  # Helm chart is published to the same OCI namespace as the image, mirroring
  # the cnak-chart convention (oci://ghcr.io/cnak-us/cnak/chart). For
  # artifact-gateway the chart name == image name, so the chart lives at
  # oci://ghcr.io/cnak-us/artifact-gateway/<chart-name> after `helm push`.
  CHART_OCI_REPO: ghcr.io/cnak-us/artifact-gateway

jobs:
  setup:
    name: Resolve Version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_num: ${{ steps.version.outputs.version_num }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - name: Extract release version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            IS_PRERELEASE="false"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
            IS_PRERELEASE="${{ github.event.release.prerelease }}"
          fi
          VERSION_NUM="${VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_num=$VERSION_NUM" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "Release version: $VERSION (num: $VERSION_NUM, prerelease: $IS_PRERELEASE)"

  build-image:
    name: Build & Push Multi-Arch Image
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Tag matrix: x.y.z, x.y, x, latest (latest only when not a prerelease)
          tags: |
            type=semver,pattern={{version}},value=${{ needs.setup.outputs.version_num }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.setup.outputs.version_num }}
            type=semver,pattern={{major}},value=${{ needs.setup.outputs.version_num }}
            type=raw,value=latest,enable=${{ needs.setup.outputs.is_prerelease != 'true' }}

      - name: Build, push, and sign multi-arch image
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=artifact-gateway-release
          cache-to: type=gha,scope=artifact-gateway-release,mode=max
          provenance: mode=max
          sbom: true
          build-args: |
            VERSION=${{ needs.setup.outputs.version_num }}

      - name: Generate build attestation
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Inspect manifest
        run: |
          docker buildx imagetools inspect \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.setup.outputs.version_num }}

  publish-chart:
    name: Publish Helm Chart
    needs: [setup, build-image]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Helm
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4
        with:
          version: v3.16.2

      - name: Log in to GHCR for Helm
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ${{ env.REGISTRY }} \
              -u ${{ github.actor }} \
              --password-stdin

      - name: Resolve chart dependencies
        run: helm dependency update chart/

      - name: Package chart
        id: package
        run: |
          VERSION="${{ needs.setup.outputs.version_num }}"
          helm package chart/ --version "$VERSION" --app-version "$VERSION"
          CHART_NAME=$(awk '/^name:/ {print $2; exit}' chart/Chart.yaml)
          CHART_TGZ="${CHART_NAME}-${VERSION}.tgz"
          ls -lh "$CHART_TGZ"
          echo "chart_tgz=$CHART_TGZ" >> "$GITHUB_OUTPUT"

      - name: Push chart to OCI registry
        run: |
          helm push "${{ steps.package.outputs.chart_tgz }}" \
            "oci://${{ env.CHART_OCI_REPO }}"

      - name: Verify chart pull
        run: |
          VERSION="${{ needs.setup.outputs.version_num }}"
          CHART_NAME=$(awk '/^name:/ {print $2; exit}' chart/Chart.yaml)
          helm pull "oci://${{ env.CHART_OCI_REPO }}/${CHART_NAME}" --version "$VERSION" --destination /tmp/verify
          ls -lh /tmp/verify

  # release-assets: intentionally omitted for v1 — artifact-gateway has no
  # standalone CLI binary. When a CLI is added later, mirror the pattern from
  # cnak/.github/workflows/release-binary.yml (matrix per OS/arch, archive,
  # softprops/action-gh-release, checksums).
